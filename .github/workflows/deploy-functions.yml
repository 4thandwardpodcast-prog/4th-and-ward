name: Deploy Firebase Functions

on:
  push:
    branches:
      - main
    paths:
      - 'functions/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install function dependencies
        run: cd functions && npm install

      - name: Write service account to disk
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/sa.json

      - name: Set Anthropic API key as Firebase secret
        run: |
          firebase functions:secrets:set ANTHROPIC_API_KEY \
            --project th-and-ward-b8f1c \
            --force <<< "${{ secrets.ANTHROPIC_API_KEY }}"
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa.json

      - name: Deploy Cloud Functions
        run: |
          firebase deploy --only functions --project th-and-ward-b8f1c
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa.json

      - name: Clean up credentials
        if: always()
        run: rm -f /tmp/sa.json
