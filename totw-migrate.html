    const logEl = document.getElementById('log');
    const barEl = document.getElementById('bar');
    function log(msg, cls='') { const d=document.createElement('div'); d.className=cls; d.textContent=msg; logEl.appendChild(d); logEl.scrollTop=logEl.scrollHeight; }
    function setBar(pct) { barEl.style.width=pct+'%'; }
    function sleep(ms) { return new Promise(r=>setTimeout(r,ms)); }

    window.run = async function() {
      document.getElementById('btn').disabled = true;
      log('Starting TOTW migration...', 'info');
      let ok=0, err=0;
      const total = WINNERS.length + NOMINEES.length;
      let done = 0;

      log('--- Writing '+WINNERS.length+' past winners to totw_winners ---','info');
      for (const w of WINNERS) {
        try {
          await addDoc(collection(db,'totw_winners'), { ...w, wonAt: Date.now() });
          log('✓ Winner: '+w.teamName+' (Ep. '+w.episode+')','ok');
          ok++;
        } catch(e) { log('✗ '+w.teamName+': '+e.message,'err'); err++; }
        done++; setBar(Math.round(done/total*100));
        await sleep(60);
      }

      log('--- Writing '+NOMINEES.length+' nominees to totw_nominees ---','info');
      for (const n of NOMINEES) {
        try {
          await addDoc(collection(db,'totw_nominees'), { ...n, submittedAt: Date.now() });
          log('✓ Nominee: '+n.teamName,'ok');
          ok++;
        } catch(e) { log('✗ '+n.teamName+': '+e.message,'err'); err++; }
        done++; setBar(Math.round(done/total*100));
        await sleep(60);
      }

      setBar(100);
      log('','');
      log('Done! '+ok+' written, '+err+' errors.', err>0?'err':'ok');
      document.getElementById('done').style.display = 'block';
    };
  </script>
